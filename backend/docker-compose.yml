version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: affinity-backend
    container_name: affinity_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - OCI_ENDPOINT=${OCI_ENDPOINT}
      - OCI_REGION=${OCI_REGION}
      - OCI_BUCKET_NAME=${OCI_BUCKET_NAME}
      - OCI_ACCESS_KEY_ID=${OCI_ACCESS_KEY_ID}
      - OCI_SECRET_ACCESS_KEY=${OCI_SECRET_ACCESS_KEY}
      # Puppeteer path is handled inside Dockerfile, but can be overridden if necessary
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: affinity_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
